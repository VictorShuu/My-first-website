<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLACK BLAST</title>
    <style>
        :root {
            --neon-red: #ff003c;
            --dark-bg: #050505;
        }

        body {
            margin: 0;
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        #game-ui {
            position: absolute;
            top: 20px;
            text-align: center;
        }

        h1 {
            letter-spacing: 10px;
            font-size: 3rem;
            margin: 0;
            color: var(--neon-red);
            text-shadow: 0 0 15px var(--neon-red);
        }

        #timer-bar-container {
            width: 300px;
            height: 10px;
            background: #222;
            margin: 20px auto;
            border-radius: 5px;
            overflow: hidden;
        }

        #timer-bar {
            width: 100%;
            height: 100%;
            background: var(--neon-red);
            transition: width 0.1s linear;
        }

        #core-container {
            position: relative;
            width: 250px;
            height: 250px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #core {

            height: 150px;
